// Vendored from canonical source calystral-io/core/core-api/proto (do not edit by hand; sync via `make proto-sync`).
syntax = "proto3";

// Read-path surface: CyQL query execution against the embedded engine.
// Concrete handlers land in a later lane; this lane defines the wire shape and
// a stubbed service that returns UNIMPLEMENTED.
package calystral.core.v1.query;

option go_package = "github.com/calystral-io/studio/internal/corepb/querypb;querypb";

// Executes read queries against the engine. Tenant scoping is applied from the
// upstream-verified principal (resolved in a later lane), not carried on the
// wire.
service QueryService {
  // Run a single CyQL query and return its result rows.
  rpc Query(QueryRequest) returns (QueryResponse);
}

message QueryRequest {
  // The CyQL query text.
  string cyql = 1;
  // Tenant the query is scoped to. Set by the gateway-verified principal.
  string tenant = 2;
  // Optional point-in-time read; unix milliseconds. 0 means "latest".
  uint64 as_of_unix_ms = 3;
}

message QueryResponse {
  // Result rows; each row is an opaque, engine-encoded record.
  repeated QueryRow rows = 1;
}

message QueryRow {
  // Engine-encoded row payload (cybr value bytes). Decoded by the caller.
  bytes payload = 1;
}
