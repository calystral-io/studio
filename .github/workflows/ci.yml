# CI for the Studio BFF.
# NOTE: org GitHub Actions billing is currently exhausted, so this workflow will
# not execute on push until billing is restored. It is committed now so the gate
# is in place and runs automatically once billing returns. Locally, `make lint`
# and `make test` enforce the same checks.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true

      - name: gofmt check
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "The following files are not gofmt-clean:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (race)
        run: go test ./... -race -count=1
